# Conveyor belt ESP32: can only publish its own data and birth/death messages
# Can only receive commands on the DCMD topic
user esp32user
topic write spBv1.0/conveyorLine/DDATA/belt01/beltDrive
topic write spBv1.0/conveyorLine/NBIRTH/belt01
topic write spBv1.0/conveyorLine/NDEATH/belt01
topic read  spBv1.0/conveyorLine/DCMD/belt01/beltDrive

# Node-RED: full read/write access to all topics
user nodered
topic #
